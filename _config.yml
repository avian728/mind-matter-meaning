title: Mind • Matter • Meaning
tagline: Exploring Reality Through Science, Philosophy, and Literature
description: A permanent academic knowledge platform for philosophy, physics, mathematics, science, literature, artificial intelligence, logic, and critical thinking.
url: "https://avian728.github.io"
baseurl: "/mind-matter-meaning"
lang: en
timezone: Asia/Kolkata
author:
  name: Mind Matter Meaning
  email: contact@example.com

markdown: kramdown
highlighter: rouge
permalink: /essays/:year/:month/:day/:title/
future: false

kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  categories:
    output: true
    permalink: /categories/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Mind Matter Meaning
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: categories
    values:
      layout: category
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts
  - vendor

feed:
  posts_limit: 20

social:
  name: Mind Matter Meaning
  links: []
