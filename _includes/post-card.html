<article class="post-card">
  <p class="eyebrow">{{ include.post.categories | first | default: "Article" }}</p>
  <h3><a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a></h3>
  {% if include.post.subtitle %}<p>{{ include.post.subtitle }}</p>{% endif %}
  <div class="meta">
    <time datetime="{{ include.post.date | date_to_xmlschema }}">{{ include.post.date | date: "%B %-d, %Y" }}</time>
    <span>{% include reading-time.html content=include.post.content %}</span>
  </div>
</article>
